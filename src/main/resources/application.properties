spring.application.name=data-enrichment-service

# Datasource (PostgreSQL) settings
spring.datasource.url=jdbc:postgresql://localhost:5432/enrichment
spring.datasource.username=postgres
spring.datasource.password=admin

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# RabbitMQ settings
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.listener.simple.acknowledge-mode=auto
spring.rabbitmq.listener.simple.default-requeue-rejected=false
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=2000ms
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=10000ms
spring.rabbitmq.listener.simple.concurrency=3
spring.rabbitmq.listener.simple.max-concurrency=10

# queue / exchange names
app.rabbitmq.inbound-queue=enrichment.inbound.queue
app.rabbitmq.inbound-dlx=enrichment.inbound.dlx
app.rabbitmq.inbound-dlq=enrichment.inbound.dlq
app.rabbitmq.outbound-exchange=enrichment.outbound.exchange
app.rabbitmq.outbound-routing-key=enrichment.result

# external service (WireMock) settings
app.enrichment-api.base-url=http://localhost:9999
app.enrichment-api.stub=true
app.enrichment-api.connect-timeout=2s
app.enrichment-api.read-timeout=5s